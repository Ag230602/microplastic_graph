function conceptMatches(text) {
  const lower = ' ' + norm(text) + ' ';

    const count = (concept.keywords || []).reduce((sum, keyword) => sum + lower.split(String(keyword).toLowerCase()).length - 1, 0);

    "General Systemic Outcomes": ['concept_oxidative_stress','concept_apoptosis','concept_inflammation']
  };
  const stat = id => {
    const c = byId[id] || {name:id, category:''};
    const papersN = conceptPaperCount(id);
    const evs = evidence.filter(e => e.concept_id === id);
    const confs = evs.map(e => Number(e.confidence)).filter(n => !isNaN(n));
    const avg = confs.length ? confs.reduce((a,b)=>a+b,0)/confs.length : null;
    const obs = observations.filter(o => o.concept_id === id);
    const strength = papersN >= 5 ? 'Strong' : papersN >= 2 ? 'Moderate' : papersN ? 'Limited' : 'None';
    const sentence = evs.map(e => e.evidence_sentence).find(Boolean) || '';
    return {c, papersN, evs, avg, obs, strength, sentence};
  };
  const specialtyCards = Object.entries(HIERARCHY.specialties).map(([specialty, diseases]) => {
    const ids = SPECIALTY_CONCEPTS[specialty] || [];
    const active = ids.some(id => stat(id).papersN > 0);
    const kgTags = ids.length ? `<p class="small">KG concepts: ${ids.map(id => `<span class="concept">${esc(byId[id]?.name || id)} (${stat(id).papersN})</span>`).join('')}</p>` : '';

  const instantiated = Object.entries(SPECIALTY_CONCEPTS).flatMap(([specialty, ids]) => ids.map(id => {

    </tr>`;
  })).join('');
  const activeSpecialties = Object.keys(SPECIALTY_CONCEPTS).filter(sp => (SPECIALTY_CONCEPTS[sp]||[]).some(id => stat(id).papersN > 0)).length;
  return `<div class="panel"><h2>Clinical Outcome Hierarchy</h2><p>${esc(HIERARCHY.description)}</p><p>${HIERARCHY.filters.map(f => `<span class="pill">${esc(f)}</span>`).join('')}</p></div>
  <div class="cards"><div class="card"><div class="n">${Object.keys(HIERARCHY.specialties).length}</div><div class="small">Medical specialties</div></div><div class="card"><div class="n">${activeSpecialties}</div><div class="small">Specialties instantiated by the 10-paper KG</div></div></div>

},

function setQuestion(text) { document.getElementById('question').value = text; runQA(); }
function renderObservations() {
  const paperSel = document.getElementById('obsPaper');
  const conceptSel = document.getElementById('obsConcept');
  const paperVal = paperSel ? paperSel.value : '';
  const conceptVal = conceptSel ? conceptSel.value : '';
  let list = observations;
  if (paperVal) list = list.filter(o => o.paper_id === paperVal);
  if (conceptVal) list = list.filter(o => o.concept_id === conceptVal);
  const html = list.map(obs => {
    const support = DATA.relationships.filter(r => r.relationship_name === 'supports' && r.target_node === obs.id);
    const about = DATA.relationships.filter(r => ['has_polymer','has_size_class','affects'].includes(r.relationship_name) && r.source_node === obs.id);
    const evs = support.map(r => byId[r.source_node]).filter(Boolean);
    const paper = byId[obs.paper_id];
    const derived = [...support.map(r => [r.relationship_name, r]), ...about.map(r => [r.relationship_name, r])];
    return `<div class="panel"><h2>${esc(obs.name)}</h2><p class="small">${esc(obs.definition)}</p>`
      + `<p><span class="pill ${support.length?'good':'bad'}">${support.length} evidence link(s)</span><span class="pill">about ${esc(obs.concept_name)}</span><span class="pill warn">confidence ${esc(obs.confidence)}</span></p>`
      + (paper ? `<p class="small">Source paper: ${esc(paper.name)}</p>` : '')
      + evs.map(ev => `<div class="quote">${esc(ev.evidence_sentence || '')}</div>`).join('')
      + `<h3>Derived Relationships</h3>`
      + derived.map(([name,r]) => `<div class="result" style="margin:6px 0;"><b>${esc(name)}</b> <span class="small"><code>${esc(r.source_node)}</code> \u2192 <code>${esc(r.target_node)}</code></span><br><span class="small">Confidence: ${esc(r.confidence)} &middot; Strength: ${esc(r.relationship_strength)}</span></div>`).join('')
      + `</div>`;
  }).join('');
  const el = document.getElementById('obsList');
  if (el) el.innerHTML = html || '<div class="panel"><p class="small">No observations match the current filter.</p></div>';
}
function renderAnswer(result) {

function runPaperTest() {

}

    const sentence = node.evidence_sentence ? `<div class="quote">${esc(node.evidence_sentence)}</div>` : '';
    const defn = node.definition ? `<p class="small">${esc(node.definition)}</p>` : '';
    details.innerHTML = `<h3><span style="color:${KG_COLORS[node.type] || '#64748b'};">\u25cf</span> ${esc(node.name)}</h3><p class="small"><b>${esc(node.type)}</b> &middot; ${esc(node.id)}</p>` + fields.map(([k, v]) => `<p class="small"><b>${esc(k)}:</b> ${esc(v)}</p>`).join('') + (kw ? `<p><b>Keywords:</b> ${kw}</p>` : '') + sentence + defn + `<h3>Connected Relationships (${connected.length})</h3>` + connected.slice(0, 20).map(r => `<div class="result" style="margin:6px 0;"><b>${esc(r.relationship_name)} <span class="pill">${protoTier(r.relationship_name)}</span></b><p class="small"><code>${esc(r.source_node)}</code> \u2192 <code>${esc(r.target_node)}</code></p>${r.evidence_sentence ? `<div class="quote">${esc(r.evidence_sentence)}</div>` : ''}<p class="small">Confidence: ${esc(r.confidence)}${r.relationship_strength ? ' &middot; Strength: ' + esc(r.relationship_strength) : ''}</p></div>`).join('') + (connected.length > 20 ? `<p class="small">Showing first 20 of ${connected.length}.</p>` : '');
  }
  function applyFilters() {
    const q = searchEl.value.trim().toLowerCase(), st = typeSel.value, tier = tierEl.value, ev = evEl.value.toLowerCase();
    const visible = new Set();
    nodeEls.forEach(({ g, node }) => {
      const mt = !q || node.name.toLowerCase().includes(q) || node.id.toLowerCase().includes(q) || node.type.toLowerCase().includes(q) || (node.concept_name || '').toLowerCase().includes(q);
      const mty = !st || node.type === st;
      const mev = !ev || !node.evidence_type || node.evidence_type.toLowerCase().includes(ev);
      const vis = mt && mty && mev;
      g.style.opacity = vis ? 1 : 0.08;
      if (vis) visible.add(node.id);
    });
    edgeEls.forEach(({ path, rel }) => {
      const vis = (!tier || protoTier(rel.relationship_name) === tier) && visible.has(rel.source_node) && visible.has(rel.target_node);
      path.style.opacity = vis ? 0.55 : 0.03;
    });
  }
  layout();
  applyFilters();
  searchEl.oninput = applyFilters;
  typeSel.onchange = applyFilters;
  viewEl.onchange = () => { layout(); applyFilters(); };
  tierEl.onchange = applyFilters;
  evEl.onchange = applyFilters;
  protoResetFn = () => {
    searchEl.value = ''; typeSel.value = ''; tierEl.value = ''; evEl.value = '';
    nodeEls.forEach(item => { item.g.style.opacity = 1; item.c.setAttribute('stroke-width', 1); });
    edgeEls.forEach(({ path, label }) => { path.setAttribute('stroke', '#cbd5e1'); path.setAttribute('stroke-width', 0.6); path.style.opacity = 0.55; label.style.opacity = 0; });
    details.innerHTML = '<h3>Full Graph View</h3><p class="small">All 10 papers are shown as Paper \u2192 Evidence \u2192 Observation \u2192 Concept. Click any node to focus its relationships and evidence.</p>';
    applyFilters();
  };
}

showTab('overview');
</script>
