<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MPKG Critique Graph</title>
  <style>
    :root {
      --bg: #f7f5ef;
      --ink: #1f2933;
      --muted: #607080;
      --line: #c9d2dc;
      --panel: #ffffff;
      --critique: #1f2933;
      --category: #2f6f9f;
      --critical: #c3475b;
      --finding: #b65f24;
      --recommendation: #238b6e;
      --other: #5f7080;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      display: grid;
      grid-template-rows: auto 1fr;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
    }
    h1 { margin: 0; font-size: 18px; letter-spacing: 0; }
    .meta { color: var(--muted); font-size: 13px; text-align: right; }
    .layout { min-height: 0; display: grid; grid-template-columns: 1fr 360px; }
    #graph { width: 100%; height: 100%; min-height: 700px; background: #fbfaf6; }
    aside { border-left: 1px solid var(--line); background: var(--panel); padding: 14px; overflow: auto; }
    .toolbar { display: grid; gap: 10px; margin-bottom: 14px; }
    input, select, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 14px;
    }
    button { cursor: pointer; font-weight: 650; }
    .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; font-size: 12px; color: var(--muted); }
    .legend span { display: flex; align-items: center; gap: 6px; }
    .swatch { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto; }
    .details { border-top: 1px solid var(--line); padding-top: 12px; }
    .details h2 { margin: 0 0 4px; font-size: 16px; line-height: 1.25; letter-spacing: 0; }
    .details .type { color: var(--muted); font-size: 13px; margin-bottom: 10px; }
    pre { white-space: pre-wrap; word-break: break-word; border: 1px solid var(--line); border-radius: 6px; padding: 10px; background: #fafafa; font-size: 12px; line-height: 1.45; }
    .link { stroke: #9aa8b5; stroke-opacity: 0.58; fill: none; }
    .link-label { fill: #657482; font-size: 9px; pointer-events: none; }
    .node circle { stroke: #fff; stroke-width: 1.5px; cursor: pointer; }
    .node text { fill: #1f2933; font-size: 10px; pointer-events: none; paint-order: stroke; stroke: #fbfaf6; stroke-width: 3px; stroke-linejoin: round; }
    .dim { opacity: 0.14; }
    .selected circle { stroke: #111827; stroke-width: 2.5px; }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: 64vh auto; }
      aside { border-left: 0; border-top: 1px solid var(--line); }
      #graph { min-height: 0; }
    }
  </style>
</head>

        adjacency.get(link.target.id).add(link.source.id);

      function tick() {
        for (const { path, label, link } of edgeEls) {
          const dx = link.target.x - link.source.x;
          const dy = link.target.y - link.source.y;
          const dr = Math.sqrt(dx * dx + dy * dy) * 1.35;
          path.setAttribute('d', 'M' + link.source.x + ',' + link.source.y + 'A' + dr + ',' + dr + ' 0 0,1 ' + link.target.x + ',' + link.target.y);
          label.setAttribute('x', (link.source.x + link.target.x) / 2);
          label.setAttribute('y', (link.source.y + link.target.y) / 2 - 4);

          const force = (distance - 120) * 0.014 * alpha;
          link.source.vx += (dx / distance) * force;
          link.source.vy += (dy / distance) * force;
          link.target.vx -= (dx / distance) * force;
          link.target.vy -= (dy / distance) * force;

    function radiusFor(node) { return node.type === 'Critique' ? 15 : (node.type === 'Category' ? 11 : 7); }
    function truncate(value, max) { return value.length > max ? value.slice(0, max - 1) + '...' : value; }
    function escapeHtml(value) { return String(value).replace(/[&<>\"]/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[char])); }
  </script>
</body>
