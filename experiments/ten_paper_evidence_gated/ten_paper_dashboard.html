function conceptMatches(text) {

    const shared = paperConcepts.filter(id => matchIds.has(id));

  DATA.relationships.forEach(rel => {

      links.push({source: nodeIndex[rel.source_node], target: nodeIndex[rel.target_node]});
    }
  });
  const deg = nodes.map(() => 0);
  links.forEach(l => { deg[l.source]++; deg[l.target]++; });
  nodes.forEach((n,i) => { n.deg = deg[i]; n.r = (n.type === 'Paper' ? 8 : 5) + Math.min(9, deg[i]); });
  return {nodes, links};
}
function layoutGraph(nodes, links, width, height, iters) {
  nodes.forEach((n,i) => { const a = (i/nodes.length)*Math.PI*2; n.x = width/2 + Math.cos(a)*Math.min(width,height)/3; n.y = height/2 + Math.sin(a)*Math.min(width,height)/3; n.vx = 0; n.vy = 0; });
  for (let it=0; it<iters; it++) {
    for (let i=0;i<nodes.length;i++) for (let j=i+1;j<nodes.length;j++) {
      let dx = nodes[i].x-nodes[j].x, dy = nodes[i].y-nodes[j].y, d2 = dx*dx+dy*dy+0.01, d = Math.sqrt(d2);
      let f = 2600/d2, fx = f*dx/d, fy = f*dy/d;
      nodes[i].vx += fx; nodes[i].vy += fy; nodes[j].vx -= fx; nodes[j].vy -= fy;
    }
    links.forEach(l => {
      const a = nodes[l.source], b = nodes[l.target];
      let dx = b.x-a.x, dy = b.y-a.y, d = Math.sqrt(dx*dx+dy*dy)+0.01, f = (d-90)*0.02, fx = f*dx/d, fy = f*dy/d;
      a.vx += fx; a.vy += fy; b.vx -= fx; b.vy -= fy;
    });
    nodes.forEach(n => {
      n.vx += (width/2-n.x)*0.001; n.vy += (height/2-n.y)*0.001;
      n.x += n.vx*0.85; n.y += n.vy*0.85; n.vx *= 0.85; n.vy *= 0.85;
      n.x = Math.max(n.r+2, Math.min(width-n.r-2, n.x)); n.y = Math.max(n.r+12, Math.min(height-n.r-2, n.y));
    });
  }
}
const GRAPH_DEFAULT_INFO = '<p class="small">Hover a node to see its details and evidence, or hover an edge to see the paper\u2013concept relationship. Drag nodes to rearrange.</p>';
function setGraphInfo(html) { const box = document.getElementById('kginfo'); if (box) box.innerHTML = html; }
function nodeInfoHTML(n) {
  if (n.type === 'Concept') {
    const evs = evidence.filter(ev => ev.concept_id === n.id);
    const sample = evs.slice(0,3).map(ev => `<div class="quote"><b>${esc(ev.paper_title)}</b><br>${esc(ev.evidence_sentence)}</div>`).join('');
    return `<h3><span style="color:#2563eb;">\u25cf</span> ${esc(n.label)}</h3><p class="small"><b>Type:</b> Concept &nbsp; <b>Category:</b> ${esc((n.raw && n.raw.category) || '\u2014')}</p><p class="small"><b>Mentioned by:</b> ${n.deg} papers &nbsp; <b>Evidence items:</b> ${evs.length}</p><p><b>Keywords:</b> ${((n.raw && n.raw.keywords) || []).map(k => `<span class="concept">${esc(k)}</span>`).join('') || '\u2014'}</p>${sample ? '<h3>Sample evidence</h3>' + sample : ''}`;
  }
  const s = n.src || {};
  return `<h3><span style="color:#059669;">\u25cf</span> ${esc(n.label)}</h3><p class="small"><b>Type:</b> Paper &nbsp; <b>Evidence type:</b> ${esc(s.evidence_type || '\u2014')}</p><p class="small"><b>Concepts linked:</b> ${n.deg} &nbsp; <b>Size:</b> ${s.section_count || '\u2014'} sections, ${s.character_count || '\u2014'} chars</p><p><b>Matched concepts:</b> ${(s.matched_concepts || []).map(c => `<span class="concept">${esc(c)}</span>`).join('') || '\u2014'}</p>`;
}
function edgeInfoHTML(link) {
  const a = GRAPH_STATE.nodes[link.source], b = GRAPH_STATE.nodes[link.target];
  const paper = a.type === 'Paper' ? a : b, concept = a.type === 'Concept' ? a : b;
  const ev = evidence.find(e => e.concept_id === concept.id && e.paper_title === paper.label);
  return `<h3>Relationship &middot; mentions_concept</h3><p class="small"><span style="color:#059669;">\u25cf</span> <b>${esc(paper.label)}</b> &rarr; <span style="color:#2563eb;">\u25cf</span> <b>${esc(concept.label)}</b></p>${ev ? `<div class="quote">${esc(ev.evidence_sentence)}</div>` : '<p class="small">This paper mentions the concept; no single stored sentence was pinpointed for this pair.</p>'}`;
}
function drawGraph(hl) {
  const svg = document.getElementById('kgsvg');
  if (!svg || !GRAPH_STATE) return;
  const {nodes, links} = GRAPH_STATE;
  const linkEls = links.map((l,li) => {
    let stroke = '#cbd5e1', w = 1, op = 1;
    if (hl) { if (hl.linkSet.has(li)) { stroke = '#f59e0b'; w = 2.5; } else { op = 0.12; } }
    return `<line class="kgedge" data-i="${li}" x1="${nodes[l.source].x.toFixed(1)}" y1="${nodes[l.source].y.toFixed(1)}" x2="${nodes[l.target].x.toFixed(1)}" y2="${nodes[l.target].y.toFixed(1)}" stroke="${stroke}" stroke-width="${w}" stroke-opacity="${op}"/>`;
  }).join('');
  const nodeEls = nodes.map((n,i) => {
    const fill = n.type === 'Paper' ? '#059669' : '#2563eb';
    const short = n.label.length > 26 ? n.label.slice(0,24) + '\u2026' : n.label;
    const dim = hl && !hl.nodeSet.has(i);
    const nodeOp = dim ? 0.15 : 0.9;
    const ring = (hl && hl.nodeSet.has(i)) ? 2.5 : 1.5;
    const label = dim ? '' : `<text x="${n.x.toFixed(1)}" y="${(n.y-n.r-3).toFixed(1)}" font-size="9" text-anchor="middle" fill="#334155">${esc(short)}</text>`;
    return `<g class="kgnode" data-i="${i}"><circle cx="${n.x.toFixed(1)}" cy="${n.y.toFixed(1)}" r="${n.r}" fill="${fill}" fill-opacity="${nodeOp}" stroke="#fff" stroke-width="${ring}"><title>${esc(n.label)} (${esc(n.type)}, ${n.deg} links)</title></circle>${label}</g>`;
  }).join('');
  svg.innerHTML = linkEls + nodeEls;
}
function renderGraph() {
  const svg = document.getElementById('kgsvg');
  if (!svg) return;
  const width = 900, height = 600, g = buildGraphData();
  layoutGraph(g.nodes, g.links, width, height, 350);
  const incident = g.nodes.map(() => []);
  g.links.forEach((l,li) => { incident[l.source].push(li); incident[l.target].push(li); });
  g.incident = incident;
  GRAPH_STATE = g;
  drawGraph();
  setGraphInfo(GRAPH_DEFAULT_INFO);
  let dragIdx = -1;
  const toSvg = evt => { const rect = svg.getBoundingClientRect(); return { x: (evt.clientX-rect.left)/rect.width*width, y: (evt.clientY-rect.top)/rect.height*height }; };
  svg.onmousedown = e => { const node = e.target.closest('.kgnode'); if (!node) return; dragIdx = +node.getAttribute('data-i'); svg.style.cursor = 'grabbing'; e.preventDefault(); };
  svg.onmousemove = e => { if (dragIdx < 0) return; const p = toSvg(e); GRAPH_STATE.nodes[dragIdx].x = p.x; GRAPH_STATE.nodes[dragIdx].y = p.y; drawGraph(); };
  window.addEventListener('mouseup', () => { dragIdx = -1; svg.style.cursor = 'grab'; });
  svg.onmouseover = e => {
    if (dragIdx >= 0) return;
    const node = e.target.closest('.kgnode');
    if (node) { const i = +node.getAttribute('data-i'); const linkSet = new Set(GRAPH_STATE.incident[i]); const nodeSet = new Set([i]); linkSet.forEach(li => { nodeSet.add(GRAPH_STATE.links[li].source); nodeSet.add(GRAPH_STATE.links[li].target); }); drawGraph({nodeSet, linkSet}); setGraphInfo(nodeInfoHTML(GRAPH_STATE.nodes[i])); return; }
    const edge = e.target.closest('.kgedge');
    if (edge) { const li = +edge.getAttribute('data-i'); const l = GRAPH_STATE.links[li]; drawGraph({nodeSet: new Set([l.source, l.target]), linkSet: new Set([li])}); setGraphInfo(edgeInfoHTML(l)); }
  };
  svg.onmouseout = e => { if (dragIdx >= 0) return; if (e.relatedTarget && svg.contains(e.relatedTarget)) return; drawGraph(); setGraphInfo(GRAPH_DEFAULT_INFO); };
}

showTab('overview');
