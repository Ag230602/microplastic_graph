<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Focused MPKG Experiment Graph</title>
  <style>
    :root {
      --bg: #f7f5ef; --panel: #fff; --ink: #1f2933; --muted: #607080; --line: #c9d2dc;
      --study: #2f6f9f; --evidence: #c9a227; --observation: #238b6e; --host: #2a9d8f;
      --polymer: #8f6a2a; --mechanism: #c3475b; --biomarker: #8b5fbf; --reservoir: #3a8fb7;
      --tissue: #7c6175; --method: #4b78c2; --other: #5f7080;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; color: var(--ink); background: var(--bg); display: grid; grid-template-rows: auto 1fr; }
    header { padding: 14px 18px; border-bottom: 1px solid var(--line); background: rgba(255,255,255,.94); display: flex; justify-content: space-between; gap: 16px; align-items: center; }
    h1 { font-size: 18px; margin: 0; letter-spacing: 0; }
    .meta { color: var(--muted); font-size: 13px; text-align: right; }
    main { display: grid; grid-template-columns: 1fr 360px; min-height: 0; }
    svg { width: 100%; height: 100%; min-height: 720px; background: #fbfaf6; }
    aside { border-left: 1px solid var(--line); background: var(--panel); padding: 14px; overflow: auto; }
    input, select, button { width: 100%; border: 1px solid var(--line); border-radius: 6px; padding: 9px 10px; background: #fff; color: var(--ink); font: inherit; font-size: 14px; margin-bottom: 10px; }
    button { cursor: pointer; font-weight: 650; }
    .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; font-size: 12px; color: var(--muted); margin: 8px 0 14px; }
    .legend span { display: flex; align-items: center; gap: 6px; }
    .swatch { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto; }
    .details { border-top: 1px solid var(--line); padding-top: 12px; }
    .details h2 { margin: 0 0 4px; font-size: 16px; line-height: 1.25; }
    .type { color: var(--muted); font-size: 13px; margin-bottom: 10px; }
    pre { white-space: pre-wrap; word-break: break-word; border: 1px solid var(--line); border-radius: 6px; padding: 10px; background: #fafafa; font-size: 12px; line-height: 1.45; }
    .link { stroke: #9aa8b5; stroke-opacity: .6; fill: none; }
    .link-label { fill: #657482; font-size: 9px; pointer-events: none; }
    .node circle { stroke: #fff; stroke-width: 1.5px; cursor: pointer; }
    .node text { fill: #1f2933; font-size: 10px; pointer-events: none; paint-order: stroke; stroke: #fbfaf6; stroke-width: 3px; stroke-linejoin: round; }
    .dim { opacity: .14; }
    .selected circle { stroke: #111827; stroke-width: 2.5px; }
    .note { color: var(--muted); font-size: 12px; line-height: 1.55; margin-bottom: 12px; }
    @media (max-width: 900px) { main { grid-template-columns: 1fr; grid-template-rows: 64vh auto; } aside { border-left: 0; border-top: 1px solid var(--line); } svg { min-height: 0; } }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Focused MPKG Experiment Graph</h1>
      <div class="note">Small anti-hallucination test graph. Full graph remains unchanged.</div>
    </div>
    <div class="meta"><span id="count">Loading...</span><br>Source: focused_mpkg_output_test.json</div>
  </header>
  <main>
    <svg id="graph" role="img" aria-label="Focused knowledge graph visualization"></svg>
    <aside>
      <input id="search" type="search" placeholder="Search nodes">
      <select id="typeFilter"><option value="">All node types</option></select>
      <button id="reset">Reset View</button>
      <div class="legend" id="legend"></div>
      <section class="details" id="details">
        <h2>Select a node</h2>
        <div class="type">Node details will appear here.</div>
      </section>
    </aside>
  </main>
  <script>
    const colorByType = {
      Study: 'var(--study)', Evidence: 'var(--evidence)', Observation: 'var(--observation)', HostPopulation: 'var(--host)',
      Polymer: 'var(--polymer)', Mechanism: 'var(--mechanism)', Biomarker: 'var(--biomarker)', EnvironmentalCompartment: 'var(--reservoir)',
      TissueOrgan: 'var(--tissue)', Method: 'var(--method)', ClinicalOutcome: 'var(--mechanism)', ExposurePathway: 'var(--other)', ParticleSizeClass: 'var(--other)', Shape: 'var(--other)'
    };
    const svg = document.getElementById('graph');
    const details = document.getElementById('details');
    const search = document.getElementById('search');
    const typeFilter = document.getElementById('typeFilter');
    const resetButton = document.getElementById('reset');

    fetch('focused_mpkg_graph_test.json').then(r => r.json()).then(init).catch(error => {
      details.innerHTML = '<h2>Could not load graph</h2><div class="type">Open through the local server URL.</div><pre>' + escapeHtml(error) + '</pre>';
    });

    function init(graph) {
      document.getElementById('count').textContent = graph.node_count + ' nodes / ' + graph.edge_count + ' edges';
      const types = [...new Set(graph.nodes.map(n => n.type))].sort();
      for (const type of types) {
        const option = document.createElement('option'); option.value = type; option.textContent = type; typeFilter.appendChild(option);
        const item = document.createElement('span'); item.innerHTML = '<i class="swatch" style="background:' + (colorByType[type] || 'var(--other)') + '"></i>' + type; legend.appendChild(item);
      }
      const nodes = graph.nodes.map(n => ({...n}));
      const nodeById = new Map(nodes.map(n => [n.id, n]));
      const links = graph.edges.filter(e => e.valid).map(e => ({...e, source: nodeById.get(e.source), target: nodeById.get(e.target)}));
      const adjacency = new Map(nodes.map(n => [n.id, new Set()]));
      for (const link of links) { adjacency.get(link.source.id).add(link.target.id); adjacency.get(link.target.id).add(link.source.id); }

      let selected = null;
      let transform = {x: 0, y: 0, scale: 1};
      const ns = 'http://www.w3.org/2000/svg';
      svg.innerHTML = '<defs><marker id="arrow" viewBox="0 -5 10 10" refX="18" refY="0" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,-5L10,0L0,5" fill="#9aa8b5"></path></marker></defs>';
      const viewport = document.createElementNS(ns, 'g');
      const edgeLayer = document.createElementNS(ns, 'g');
      const labelLayer = document.createElementNS(ns, 'g');
      const nodeLayer = document.createElementNS(ns, 'g');
      viewport.append(edgeLayer, labelLayer, nodeLayer); svg.appendChild(viewport);

      seedPositions(nodes, width(), height());
      runLayout(nodes, links, width(), height(), 520);
      const edgeEls = links.map(link => {
        const path = document.createElementNS(ns, 'path'); path.classList.add('link'); path.setAttribute('marker-end', 'url(#arrow)'); edgeLayer.appendChild(path);
        const label = document.createElementNS(ns, 'text'); label.classList.add('link-label'); label.textContent = link.label; labelLayer.appendChild(label);
        return {path, label, link};
      });
      const nodeEls = nodes.map(node => {
        const group = document.createElementNS(ns, 'g'); group.classList.add('node');
        const circle = document.createElementNS(ns, 'circle'); circle.setAttribute('r', radiusFor(node)); circle.setAttribute('fill', colorByType[node.type] || 'var(--other)');
        const text = document.createElementNS(ns, 'text'); text.setAttribute('x', radiusFor(node) + 4); text.setAttribute('y', 3); text.textContent = truncate(node.label, 34);
        group.append(circle, text); group.addEventListener('click', () => selectNode(node)); nodeLayer.appendChild(group);
        return {group, node};
      });
      tick();
      search.addEventListener('input', applyFilters); typeFilter.addEventListener('change', applyFilters);
      resetButton.addEventListener('click', () => { selected = null; transform = {x: 0, y: 0, scale: 1}; updateTransform(); applyFilters(); details.innerHTML = '<h2>Select a node</h2><div class="type">Node details will appear here.</div>'; });
      svg.addEventListener('wheel', event => { event.preventDefault(); transform.scale = Math.max(.35, Math.min(2.4, transform.scale * (event.deltaY > 0 ? .9 : 1.1))); updateTransform(); }, {passive: false});
      let panning = false, last = null;
      svg.addEventListener('pointerdown', event => { if (event.target.closest('.node')) return; panning = true; last = {x: event.clientX, y: event.clientY}; svg.setPointerCapture(event.pointerId); });
      svg.addEventListener('pointermove', event => { if (!panning) return; transform.x += event.clientX - last.x; transform.y += event.clientY - last.y; last = {x: event.clientX, y: event.clientY}; updateTransform(); });
      svg.addEventListener('pointerup', () => { panning = false; });

      function width() { return svg.clientWidth || 900; }
      function height() { return svg.clientHeight || 700; }
      function tick() {
        for (const {path, label, link} of edgeEls) {
          path.setAttribute('d', 'M' + link.source.x + ',' + link.source.y + 'L' + link.target.x + ',' + link.target.y);
          label.setAttribute('x', (link.source.x + link.target.x) / 2); label.setAttribute('y', (link.source.y + link.target.y) / 2);
        }
        for (const {group, node} of nodeEls) group.setAttribute('transform', 'translate(' + node.x + ',' + node.y + ')');
      }
      function updateTransform() { viewport.setAttribute('transform', 'translate(' + transform.x + ' ' + transform.y + ') scale(' + transform.scale + ')'); }
      function selectNode(node) {
        selected = node;
        details.innerHTML = '<h2>' + escapeHtml(node.label) + '</h2><div class="type">' + escapeHtml(node.type) + ' · ' + escapeHtml(node.id) + '</div><pre>' + escapeHtml(JSON.stringify(node.data, null, 2)) + '</pre>';
        applyFilters();
      }
      function applyFilters() {
        const q = search.value.trim().toLowerCase(); const type = typeFilter.value; const neighbors = selected ? adjacency.get(selected.id) : null;
        for (const {group, node} of nodeEls) {
          const match = (!q || node.label.toLowerCase().includes(q) || node.id.toLowerCase().includes(q)) && (!type || node.type === type);
          const related = !selected || node.id === selected.id || neighbors.has(node.id);
          group.classList.toggle('dim', !match || !related); group.classList.toggle('selected', selected && node.id === selected.id);
        }
        for (const {path, label, link} of edgeEls) {
          const related = !selected || link.source.id === selected.id || link.target.id === selected.id;
          path.classList.toggle('dim', !related); label.classList.toggle('dim', !related);
        }
      }
    }

    function seedPositions(nodes, width, height) {
      const cx = width / 2, cy = height / 2, radius = Math.max(180, Math.min(width, height) * .36);
      nodes.forEach((node, index) => { const angle = 2 * Math.PI * index / nodes.length; node.x = cx + radius * Math.cos(angle); node.y = cy + radius * Math.sin(angle); });
    }
    function runLayout(nodes, links, width, height, iterations) {
      for (let step = 0; step < iterations; step++) {
        for (let i = 0; i < nodes.length; i++) for (let j = i + 1; j < nodes.length; j++) {
          const a = nodes[i], b = nodes[j], dx = b.x - a.x || .01, dy = b.y - a.y || .01, dist2 = dx * dx + dy * dy, force = 850 / dist2;
          a.x -= dx * force; a.y -= dy * force; b.x += dx * force; b.y += dy * force;
        }
        for (const link of links) {
          const dx = link.target.x - link.source.x, dy = link.target.y - link.source.y, dist = Math.hypot(dx, dy) || 1, diff = (dist - 130) * .025;
          const ox = dx / dist * diff, oy = dy / dist * diff; link.source.x += ox; link.source.y += oy; link.target.x -= ox; link.target.y -= oy;
        }
        for (const node of nodes) { node.x += (width / 2 - node.x) * .004; node.y += (height / 2 - node.y) * .004; node.x = Math.max(30, Math.min(width - 30, node.x)); node.y = Math.max(30, Math.min(height - 30, node.y)); }
      }
    }
    function radiusFor(node) { return node.type === 'Study' ? 12 : (node.type === 'Evidence' || node.type === 'Observation' || node.type === 'HostPopulation' ? 9 : 7); }
    function truncate(value, max) { return value.length > max ? value.slice(0, max - 1) + '…' : value; }
    function escapeHtml(value) { return String(value).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
  </script>
</body>
</html>
