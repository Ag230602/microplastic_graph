      border-radius: 6px;

      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 14px;
    }
    button { cursor: pointer; font-weight: 650; }
    .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; font-size: 12px; color: var(--muted); }
    .legend span { display: flex; align-items: center; gap: 6px; }

    .details { border-top: 1px solid var(--line); padding-top: 12px; }
    .details h2 { margin: 0 0 4px; font-size: 16px; line-height: 1.25; letter-spacing: 0; }
    .details .type { color: var(--muted); font-size: 13px; margin-bottom: 10px; }

    .link { stroke: #9aa8b5; stroke-opacity: 0.58; fill: none; }
    .link-label { fill: #657482; font-size: 9px; pointer-events: none; }
    .node circle { stroke: #fff; stroke-width: 1.5px; cursor: pointer; }
    .node text { fill: #1f2933; font-size: 10px; pointer-events: none; paint-order: stroke; stroke: #fbfaf6; stroke-width: 3px; stroke-linejoin: round; }
    .dim { opacity: 0.14; }
    .selected circle { stroke: #111827; stroke-width: 2.5px; }
    @media (max-width: 900px) {

        return { path, label, link };
      });
      const nodeEls = nodes.map((node) => {
        const group = document.createElementNS(ns, 'g');
        group.classList.add('node');
        const circle = document.createElementNS(ns, 'circle');
        circle.setAttribute('r', radiusFor(node));
        circle.setAttribute('fill', colorByType[node.type] || 'var(--other)');
        const text = document.createElementNS(ns, 'text');
        text.setAttribute('x', radiusFor(node) + 4);
        text.setAttribute('y', 3);
        text.textContent = truncate(node.label, 34);
        group.append(circle, text);
        group.addEventListener('click', () => selectNode(node));
        nodeLayer.appendChild(group);
        return { group, node };
      });

      seedPositions(nodes, width(), height());
      runLayout(nodes, links, width(), height(), 420);
      tick();
      search.addEventListener('input', applyFilters);
      typeFilter.addEventListener('change', applyFilters);
      resetButton.addEventListener('click', () => {
        selected = null;
        transform = { x: 0, y: 0, scale: 1 };
        updateTransform();
        applyFilters();
        details.innerHTML = '<h2>Select a node</h2><div class="type">Node details will appear here.</div>';
      });

      let panning = false;
      let last = null;
      svg.addEventListener('pointerdown', (event) => {
        if (event.target.closest('.node')) return;
        panning = true;
        last = { x: event.clientX, y: event.clientY };
        svg.setPointerCapture(event.pointerId);
      });
      svg.addEventListener('pointermove', (event) => {
        if (!panning) return;
        transform.x += event.clientX - last.x;
        transform.y += event.clientY - last.y;
        last = { x: event.clientX, y: event.clientY };
        updateTransform();
      });
      svg.addEventListener('pointerup', () => { panning = false; });
      svg.addEventListener('wheel', (event) => {
        event.preventDefault();
        transform.scale = Math.max(0.35, Math.min(2.4, transform.scale * (event.deltaY > 0 ? 0.9 : 1.1)));
        updateTransform();
      }, { passive: false });

      function tick() {
        for (const { path, label, link } of edgeEls) {
          const dx = link.target.x - link.source.x;
          const dy = link.target.y - link.source.y;
          const dr = Math.sqrt(dx * dx + dy * dy) * 1.35;
          path.setAttribute('d', 'M' + link.source.x + ',' + link.source.y + 'A' + dr + ',' + dr + ' 0 0,1 ' + link.target.x + ',' + link.target.y);
          label.setAttribute('x', (link.source.x + link.target.x) / 2);
          label.setAttribute('y', (link.source.y + link.target.y) / 2 - 4);
        }
        for (const { group, node } of nodeEls) group.setAttribute('transform', 'translate(' + node.x + ',' + node.y + ')');
      }
      function selectNode(node) {
        selected = node;
        details.innerHTML = '<h2>' + escapeHtml(node.label) + '</h2><div class="type">' + escapeHtml(node.type) + ' · ' + escapeHtml(node.id) + '</div><pre>' + escapeHtml(JSON.stringify(node.data, null, 2)) + '</pre>';
        applyFilters();
      }
      function applyFilters() {
        const query = search.value.trim().toLowerCase();
        const type = typeFilter.value;
        const visible = new Set(nodes.filter((node) => {
          const text = (node.id + ' ' + node.label + ' ' + node.type).toLowerCase();
          return (!query || text.includes(query)) && (!type || node.type === type);
        }).map((node) => node.id));
        const related = selected ? adjacency.get(selected.id) : null;
        for (const item of nodeEls) {
          const filtered = !visible.has(item.node.id);
          const unrelated = selected && item.node.id !== selected.id && !related.has(item.node.id);
          item.group.classList.toggle('dim', filtered || unrelated);
          item.group.classList.toggle('selected', selected && item.node.id === selected.id);
        }
        for (const item of edgeEls) {
          const filtered = !visible.has(item.link.source.id) || !visible.has(item.link.target.id);
          const unrelated = selected && item.link.source.id !== selected.id && item.link.target.id !== selected.id;
          item.path.classList.toggle('dim', filtered || unrelated);
          item.label.classList.toggle('dim', filtered || unrelated);
        }
      }
      function updateTransform() { viewport.setAttribute('transform', 'translate(' + transform.x + ',' + transform.y + ') scale(' + transform.scale + ')'); }
    }

    function seedPositions(nodes, width, height) {
      const centerX = width / 2;
      const centerY = height / 2;
      nodes.forEach((node, index) => {
        const angle = (index / nodes.length) * Math.PI * 2;
        const radius = Math.min(width, height) * (0.18 + (index % 5) * 0.035);
        node.x = centerX + Math.cos(angle) * radius;
        node.y = centerY + Math.sin(angle) * radius;
        node.vx = 0;
        node.vy = 0;
      });
    }
    function runLayout(nodes, links, width, height, steps) {
      const centerX = width / 2;
      const centerY = height / 2;
      for (let step = 0; step < steps; step++) {
        const alpha = 1 - step / steps;
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const a = nodes[i];
            const b = nodes[j];
            let dx = b.x - a.x;
            let dy = b.y - a.y;
            let distance = Math.sqrt(dx * dx + dy * dy) || 1;
            const force = (720 / (distance * distance)) * alpha;
            dx /= distance;
            dy /= distance;
            a.vx -= dx * force;
            a.vy -= dy * force;
            b.vx += dx * force;
            b.vy += dy * force;
          }
        }
        for (const link of links) {
          const dx = link.target.x - link.source.x;
          const dy = link.target.y - link.source.y;
          const distance = Math.sqrt(dx * dx + dy * dy) || 1;
          const force = (distance - 116) * 0.014 * alpha;
          link.source.vx += (dx / distance) * force;
          link.source.vy += (dy / distance) * force;
          link.target.vx -= (dx / distance) * force;
          link.target.vy -= (dy / distance) * force;
        }
        for (const node of nodes) {
          node.vx += (centerX - node.x) * 0.003 * alpha;
          node.vy += (centerY - node.y) * 0.003 * alpha;
          node.vx *= 0.82;
          node.vy *= 0.82;
          node.x = Math.max(36, Math.min(width - 36, node.x + node.vx));
          node.y = Math.max(36, Math.min(height - 36, node.y + node.vy));
        }
      }
    }
    function radiusFor(node) { return node.type === 'Study' ? 13 : (node.type === 'Observation' || node.type === 'Association' ? 9 : 7); }
    function truncate(value, max) { return value.length > max ? value.slice(0, max - 1) + '...' : value; }
    function escapeHtml(value) { return String(value).replace(/[&<>\"]/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[char])); }
  </script>
</body>
</html>
